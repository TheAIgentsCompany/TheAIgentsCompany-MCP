<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheAIgentsCompany — Message Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      padding: 60px 20px 40px;
      text-align: center;
    }
    .header h1 { font-size: 2.2rem; font-weight: 700; color: #fff; }
    .header p { margin-top: 8px; color: rgba(255,255,255,0.8); font-size: 1rem; }
    .container { max-width: 720px; margin: 0 auto; padding: 30px 20px; }

    /* Form */
    .form-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
    }
    .form-card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #a5b4fc; }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .form-row input, .form-row textarea {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2d2d4a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
    }
    .form-row textarea { min-height: 80px; resize: vertical; }
    .form-row input:focus, .form-row textarea:focus {
      outline: none; border-color: #6366F1;
    }
    .form-actions { display: flex; justify-content: flex-end; }
    .btn {
      background: #6366F1; color: #fff; border: none;
      padding: 10px 24px; border-radius: 8px; font-size: 0.95rem;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Messages */
    .msg-card {
      background: #1a1a2e;
      border: 1px solid #2d2d4a;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .msg-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .msg-pseudo {
      font-weight: 600; color: #a5b4fc; font-size: 0.95rem;
    }
    .msg-date {
      font-size: 0.8rem; color: #64748b;
    }
    .msg-text {
      font-size: 0.95rem; line-height: 1.5; color: #cbd5e1;
    }
    .empty {
      text-align: center; color: #64748b; padding: 60px 0;
    }
    .empty p { margin-top: 8px; font-size: 0.9rem; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; border: 1px solid #22c55e; border-radius: 8px;
      padding: 12px 20px; color: #22c55e; font-size: 0.9rem;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.error { border-color: #ef4444; color: #ef4444; }
    .toast.show { opacity: 1; }
    .badge {
      display: inline-block; background: #6366F1; color: #fff;
      border-radius: 999px; padding: 2px 10px; font-size: 0.8rem;
      margin-left: 8px;
    }
    .footer {
      text-align: center; padding: 30px; color: #64748b; font-size: 0.85rem;
    }
    .footer a { color: #6366F1; text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <img src="https://capsule-render.vercel.app/api?type=waving&color=6366F1&height=120&section=header&text=Message%20Board&fontSize=40&fontColor=ffffff&animation=fadeIn" width="100%" style="max-width:600px"/>
</div>

<div class="container">
  <!-- Form -->
  <div class="form-card">
    <h2>✏️ Leave a message</h2>
    <div class="form-row">
      <input type="text" id="pseudo" placeholder="Your name or nickname" maxlength="50" />
    </div>
    <div class="form-row">
      <textarea id="message" placeholder="Write your message..." maxlength="500"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Messages -->
  <div style="display:flex;align-items:center;margin-bottom:16px;">
    <h2 style="color:#a5b4fc;font-size:1.1rem;">💬 Messages</h2>
    <span class="badge" id="countBadge">0</span>
  </div>
  <div id="messagesList"></div>
</div>

<div class="footer">
  <i>Powered by <a href="https://github.com/TheAIgentsCompany/TheAIgentsCompany-MCP">TheAIgentsCompany-MCP</a></i>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://gvkljtwhsulzdpsapaau.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2a2xqdHdoc3VsemRwc2FwYWF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc0NjU5MTQsImV4cCI6MjA2MzA0MTkxNH0.X86ep8qcQ4bp6nPMxW9v4HJCnHWBq7k8oYgKfN2vR88";

async function loadMessages() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/messages?select=id,pseudo,message,created_at&order=created_at.desc&limit=100`, {
    headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
  });
  const msgs = await res.json();
  document.getElementById("countBadge").textContent = msgs.length;

  const list = document.getElementById("messagesList");
  if (msgs.length === 0) {
    list.innerHTML = `<div class="empty">📭 <p>No messages yet. Be the first!</p></div>`;
    return;
  }

  list.innerHTML = msgs.map(m => `
    <div class="msg-card">
      <div class="msg-header">
        <span class="msg-pseudo">${escapeHtml(m.pseudo)}</span>
        <span class="msg-date">${new Date(m.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
      </div>
      <div class="msg-text">${escapeHtml(m.message)}</div>
    </div>
  `).join("");
}

async function sendMessage() {
  const pseudo = document.getElementById("pseudo").value.trim();
  const message = document.getElementById("message").value.trim();
  const btn = document.getElementById("sendBtn");

  if (!pseudo || !message) { showToast("Fill in both fields", true); return; }

  btn.disabled = true;
  btn.textContent = "Sending...";

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
        "Content-Type": "application/json", Prefer: "return=minimal"
      },
      body: JSON.stringify({ pseudo, message })
    });

    if (!res.ok) { showToast("Error saving message", true); btn.disabled = false; btn.textContent = "Send"; return; }

    document.getElementById("pseudo").value = "";
    document.getElementById("message").value = "";
    showToast("✅ Message sent!");
    loadMessages();
  } catch (e) { showToast("Network error", true); }

  btn.disabled = false;
  btn.textContent = "Send";
}

function showToast(text, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = text; t.className = "toast" + (isError ? " error" : "") + " show";
  setTimeout(() => t.classList.remove("show"), 3000);
}

function escapeHtml(s) {
  const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
}

loadMessages();
</script>
</body>
</html>
